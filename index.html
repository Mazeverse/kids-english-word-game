<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kids English Word Game</title>
<style>
body{font-family:Arial,sans-serif;background:#f6f8ff;margin:0}
.wrap{max-width:700px;margin:40px auto;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
h1{margin-top:0}
.word{font-size:42px;font-weight:bold;margin:20px 0;color:#4f46e5}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{padding:14px;border:none;border-radius:10px;background:#e5e7eb;font-size:18px;cursor:pointer}
button:hover{background:#c7d2fe}
#msg{margin-top:18px;font-weight:bold;font-size:20px}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1>Kids English Word Game</h1>
<div class="word" id="word"></div>
<div class="grid" id="choices"></div>
<div id="msg"></div>
</div>
</div>
<script src="words.js"></script>
<script>
let current;
function shuffle(a){return a.sort(()=>Math.random()-0.5)}
function next(){
 document.getElementById('msg').textContent='';
 current=WORDS[Math.floor(Math.random()*WORDS.length)];
 document.getElementById('word').textContent=current.word;
 const wrong=shuffle(WORDS.filter(x=>x.word!==current.word)).slice(0,3).map(x=>x.meaning);
 const opts=shuffle([...wrong,current.meaning]);
 const c=document.getElementById('choices'); c.innerHTML='';
 opts.forEach(o=>{
  const b=document.createElement('button');
  b.textContent=o;
  b.onclick=()=>{
   if(o===current.meaning){document.getElementById('msg').textContent='✅ Correct!';setTimeout(next,700);}
   else document.getElementById('msg').textContent='❌ Try again!';
  };
  c.appendChild(b);
 });
}
next();
</script>
</body>
</html>
